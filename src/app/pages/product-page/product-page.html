<div class="flex justify-content-end">
    <p-menubar [model]="menubarItems" />
</div>
<div class="mt-4">
    <p-table [value]="products()" selectionMode="single" (selectionChange)="onSelectedProductChange($event)"
        [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template #header>
            <tr>
                <th>Id</th>
                <th>Nombre</th>
                <th>Unidad de medida</th>
                <th>Precio</th>
            </tr>
        </ng-template>
        <ng-template #body let-product>
            <tr [pSelectableRow]="product">
                <td>{{ product.id }}</td>
                <td>{{ product.name }}</td>
                <td>{{ product.unit_of_measurement }}</td>
                <td>{{ product.price }}</td>
            </tr>
        </ng-template>
    </p-table>
</div>
