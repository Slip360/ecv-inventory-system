<div class="flex justify-content-end">
    <p-menubar [model]="menubarItems()" />
</div>
<div class="mt-4">
    <p-table [value]="stocks()" selectionMode="single" (selectionChange)="onSelectedStockChange($event)"
        [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template #header>
            <tr>
                <th>Id</th>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Unidad de medida</th>
                <th>Precio</th>
            </tr>
        </ng-template>
        <ng-template #body let-stock>
            <tr [pSelectableRow]="stock">
                <td>{{ stock.id }}</td>
                <td>{{ stock.product.name }}</td>
                <td>{{ stock.stock.quantity }}</td>
                <td>{{ stock.product.unit_of_measurement }}</td>
                <td>{{ stock.product.price }}</td>
            </tr>
        </ng-template>
    </p-table>
</div>
